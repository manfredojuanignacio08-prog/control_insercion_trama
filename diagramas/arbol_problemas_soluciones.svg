<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 980" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="fp" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#8B1F1F"/></marker>
    <marker id="fs" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#2E6E4A"/></marker>
  </defs>

  <rect width="1400" height="980" fill="#faf5ec"/>
  <text x="700" y="40" text-anchor="middle" font-size="24" font-weight="bold" fill="#7c2155">Árbol de problemas y soluciones</text>
  <text x="700" y="64" text-anchor="middle" font-size="14" fill="#6b5b53">Cómo se llegó a la solución del proyecto · Control de Inserción de Trama</text>

  <!-- Divisoria vertical -->
  <line x1="700" y1="90" x2="700" y2="900" stroke="#D6C9B8" stroke-width="2" stroke-dasharray="6 5"/>

  <!-- ══════════════ LADO IZQUIERDO: PROBLEMAS ══════════════ -->
  <rect x="30" y="86" width="640" height="34" rx="8" fill="#8B1F1F"/>
  <text x="350" y="109" text-anchor="middle" font-size="16" font-weight="bold" fill="#fff">ÁRBOL DE PROBLEMAS</text>

  <!-- EFECTOS (copa, arriba) -->
  <text x="350" y="146" text-anchor="middle" font-size="12.5" font-weight="bold" fill="#8B1F1F">🍂 EFECTOS (consecuencias)</text>
  <g font-size="10.5" fill="#3d2020">
    <rect x="40" y="156" width="150" height="46" rx="6" fill="#fdeaea" stroke="#c0392b" stroke-width="1"/>
    <text x="115" y="176" text-anchor="middle">Se pierde tiempo</text>
    <text x="115" y="190" text-anchor="middle">rehaciendo patrones</text>

    <rect x="200" y="156" width="150" height="46" rx="6" fill="#fdeaea" stroke="#c0392b" stroke-width="1"/>
    <text x="275" y="176" text-anchor="middle">Errores al cargar</text>
    <text x="275" y="190" text-anchor="middle">a mano</text>

    <rect x="360" y="156" width="150" height="46" rx="6" fill="#fdeaea" stroke="#c0392b" stroke-width="1"/>
    <text x="435" y="176" text-anchor="middle">No se puede repetir</text>
    <text x="435" y="190" text-anchor="middle">un diseño exacto</text>

    <rect x="520" y="156" width="140" height="46" rx="6" fill="#fdeaea" stroke="#c0392b" stroke-width="1"/>
    <text x="590" y="172" text-anchor="middle">Sin historial ni</text>
    <text x="590" y="186" text-anchor="middle">trazabilidad; depende</text>
    <text x="590" y="198" text-anchor="middle">de la persona</text>
  </g>

  <!-- flechas efectos hacia tronco -->
  <line x1="350" y1="202" x2="350" y2="228" stroke="#8B1F1F" stroke-width="1.5" marker-end="url(#fp)"/>

  <!-- TRONCO: problema central -->
  <rect x="70" y="230" width="560" height="70" rx="10" fill="#8B1F1F"/>
  <text x="350" y="256" text-anchor="middle" font-size="13" font-weight="bold" fill="#fff">PROBLEMA CENTRAL</text>
  <text x="350" y="276" text-anchor="middle" font-size="12" fill="#fff">El diseño y control de patrones del telar es manual,</text>
  <text x="350" y="292" text-anchor="middle" font-size="12" fill="#fff">sin registro digital ni forma de repetirlo con exactitud.</text>

  <!-- flechas causas hacia tronco -->
  <line x1="350" y1="330" x2="350" y2="302" stroke="#8B1F1F" stroke-width="1.5" marker-end="url(#fp)"/>

  <!-- CAUSAS (raíces, abajo) -->
  <text x="350" y="326" text-anchor="middle" font-size="12.5" font-weight="bold" fill="#8B1F1F">🌱 CAUSAS (raíces)</text>
  <g font-size="10.5" fill="#3d2020">
    <rect x="40" y="336" width="196" height="42" rx="6" fill="#fff" stroke="#c0392b" stroke-width="1"/>
    <text x="138" y="353" text-anchor="middle">El patrón se define a mano</text>
    <text x="138" y="367" text-anchor="middle">o de memoria</text>

    <rect x="246" y="336" width="208" height="42" rx="6" fill="#fff" stroke="#c0392b" stroke-width="1"/>
    <text x="350" y="353" text-anchor="middle">No hay base de datos ni</text>
    <text x="350" y="367" text-anchor="middle">sistema central</text>

    <rect x="464" y="336" width="196" height="42" rx="6" fill="#fff" stroke="#c0392b" stroke-width="1"/>
    <text x="562" y="353" text-anchor="middle">El telar no está conectado</text>
    <text x="562" y="367" text-anchor="middle">a ningún sistema</text>

    <rect x="90" y="384" width="230" height="42" rx="6" fill="#fff" stroke="#c0392b" stroke-width="1"/>
    <text x="205" y="401" text-anchor="middle">El prototipo guardaba todo en</text>
    <text x="205" y="415" text-anchor="middle">el navegador (localStorage)</text>

    <rect x="340" y="384" width="230" height="42" rx="6" fill="#fff" stroke="#c0392b" stroke-width="1"/>
    <text x="455" y="401" text-anchor="middle">No hay trazabilidad de</text>
    <text x="455" y="415" text-anchor="middle">la producción</text>
  </g>

  <!-- ══════════════ LADO DERECHO: SOLUCIONES ══════════════ -->
  <rect x="730" y="86" width="640" height="34" rx="8" fill="#2E6E4A"/>
  <text x="1050" y="109" text-anchor="middle" font-size="16" font-weight="bold" fill="#fff">ÁRBOL DE SOLUCIONES</text>

  <!-- FINES (copa) -->
  <text x="1050" y="146" text-anchor="middle" font-size="12.5" font-weight="bold" fill="#2E6E4A">🍎 FINES (beneficios)</text>
  <g font-size="10.5" fill="#1e3d2a">
    <rect x="740" y="156" width="150" height="46" rx="6" fill="#eaf6ee" stroke="#2E6E4A" stroke-width="1"/>
    <text x="815" y="176" text-anchor="middle">Se ahorra tiempo:</text>
    <text x="815" y="190" text-anchor="middle">reutilizar en segundos</text>

    <rect x="900" y="156" width="150" height="46" rx="6" fill="#eaf6ee" stroke="#2E6E4A" stroke-width="1"/>
    <text x="975" y="176" text-anchor="middle">Menos errores</text>
    <text x="975" y="190" text-anchor="middle">(validación)</text>

    <rect x="1060" y="156" width="150" height="46" rx="6" fill="#eaf6ee" stroke="#2E6E4A" stroke-width="1"/>
    <text x="1135" y="176" text-anchor="middle">Se repite un diseño</text>
    <text x="1135" y="190" text-anchor="middle">exacto siempre</text>

    <rect x="1220" y="156" width="140" height="46" rx="6" fill="#eaf6ee" stroke="#2E6E4A" stroke-width="1"/>
    <text x="1290" y="172" text-anchor="middle">Trazabilidad</text>
    <text x="1290" y="186" text-anchor="middle">completa; el saber</text>
    <text x="1290" y="198" text-anchor="middle">vive en el sistema</text>
  </g>

  <line x1="1050" y1="202" x2="1050" y2="228" stroke="#2E6E4A" stroke-width="1.5" marker-end="url(#fs)"/>

  <!-- TRONCO: objetivo central -->
  <rect x="770" y="230" width="560" height="70" rx="10" fill="#2E6E4A"/>
  <text x="1050" y="256" text-anchor="middle" font-size="13" font-weight="bold" fill="#fff">OBJETIVO CENTRAL</text>
  <text x="1050" y="276" text-anchor="middle" font-size="12" fill="#fff">Digitalizar el diseño y control de patrones, con un sistema</text>
  <text x="1050" y="292" text-anchor="middle" font-size="12" fill="#fff">central que guarda todo y se conecta al telar físico.</text>

  <line x1="1050" y1="330" x2="1050" y2="302" stroke="#2E6E4A" stroke-width="1.5" marker-end="url(#fs)"/>

  <!-- MEDIOS (raíces) -->
  <text x="1050" y="326" text-anchor="middle" font-size="12.5" font-weight="bold" fill="#2E6E4A">🌱 MEDIOS (lo que se hizo)</text>
  <g font-size="10.5" fill="#1e3d2a">
    <rect x="740" y="336" width="196" height="42" rx="6" fill="#fff" stroke="#2E6E4A" stroke-width="1"/>
    <text x="838" y="353" text-anchor="middle">Editor visual de patrones</text>
    <text x="838" y="367" text-anchor="middle">(página web)</text>

    <rect x="946" y="336" width="208" height="42" rx="6" fill="#fff" stroke="#2E6E4A" stroke-width="1"/>
    <text x="1050" y="353" text-anchor="middle">Base de datos central</text>
    <text x="1050" y="367" text-anchor="middle">(PostgreSQL / Supabase)</text>

    <rect x="1164" y="336" width="196" height="42" rx="6" fill="#fff" stroke="#2E6E4A" stroke-width="1"/>
    <text x="1262" y="353" text-anchor="middle">Backend con API REST</text>
    <text x="1262" y="367" text-anchor="middle">(intermediario único)</text>

    <rect x="770" y="384" width="180" height="42" rx="6" fill="#fff" stroke="#2E6E4A" stroke-width="1"/>
    <text x="860" y="401" text-anchor="middle">Guardado real en la base</text>
    <text x="860" y="415" text-anchor="middle">(no más localStorage)</text>

    <rect x="960" y="384" width="180" height="42" rx="6" fill="#fff" stroke="#2E6E4A" stroke-width="1"/>
    <text x="1050" y="401" text-anchor="middle">Firmware ESP32 (gateway</text>
    <text x="1050" y="415" text-anchor="middle">relés Marcha/Pausa)</text>

    <rect x="1150" y="384" width="210" height="42" rx="6" fill="#fff" stroke="#2E6E4A" stroke-width="1"/>
    <text x="1255" y="401" text-anchor="middle">Historial de producción</text>
    <text x="1255" y="415" text-anchor="middle">y log de errores</text>
  </g>

  <!-- ══════════════ ABAJO: CÓMO SE LLEGÓ A LA SOLUCIÓN ══════════════ -->
  <rect x="30" y="452" width="1340" height="30" rx="8" fill="#7c2155"/>
  <text x="700" y="473" text-anchor="middle" font-size="15" font-weight="bold" fill="#fff">CÓMO SE LLEGÓ A LA SOLUCIÓN (el recorrido)</text>

  <!-- pasos como cadena horizontal -->
  <g font-size="11">
    <!-- Paso 1 -->
    <rect x="40" y="500" width="200" height="96" rx="8" fill="#F2DCE9" stroke="#7c2155" stroke-width="1.5"/>
    <circle cx="62" cy="522" r="12" fill="#7c2155"/><text x="62" y="526" text-anchor="middle" font-size="12" font-weight="bold" fill="#fff">1</text>
    <text x="82" y="526" font-size="11.5" font-weight="bold" fill="#7c2155">Punto de partida</text>
    <text x="52" y="548" fill="#3d2020" font-size="10.5">Prototipo que solo vivía</text>
    <text x="52" y="562" fill="#3d2020" font-size="10.5">en el navegador. Dibujaba,</text>
    <text x="52" y="576" fill="#3d2020" font-size="10.5">pero no era un sistema</text>
    <text x="52" y="590" fill="#3d2020" font-size="10.5">(sin servidor ni BD).</text>

    <!-- Paso 2 -->
    <rect x="260" y="500" width="200" height="96" rx="8" fill="#fff" stroke="#7c2155" stroke-width="1.5"/>
    <circle cx="282" cy="522" r="12" fill="#7c2155"/><text x="282" y="526" text-anchor="middle" font-size="12" font-weight="bold" fill="#fff">2</text>
    <text x="302" y="526" font-size="11.5" font-weight="bold" fill="#7c2155">Datos se pierden</text>
    <text x="272" y="548" fill="#3d2020" font-size="10.5">→ Backend + base de datos.</text>
    <text x="272" y="562" fill="#3d2020" font-size="10.5">Modelo de 4 tablas y API</text>
    <text x="272" y="576" fill="#3d2020" font-size="10.5">REST. La web se reconecta</text>
    <text x="272" y="590" fill="#3d2020" font-size="10.5">a la API, no a localStorage.</text>

    <!-- Paso 3 -->
    <rect x="480" y="500" width="200" height="96" rx="8" fill="#fff" stroke="#7c2155" stroke-width="1.5"/>
    <circle cx="502" cy="522" r="12" fill="#7c2155"/><text x="502" y="526" text-anchor="middle" font-size="12" font-weight="bold" fill="#fff">3</text>
    <text x="522" y="526" font-size="11.5" font-weight="bold" fill="#7c2155">¿Dónde alojarla?</text>
    <text x="492" y="548" fill="#3d2020" font-size="10.5">→ PostgreSQL en Supabase</text>
    <text x="492" y="562" fill="#3d2020" font-size="10.5">(nube). Sin servidor propio,</text>
    <text x="492" y="576" fill="#3d2020" font-size="10.5">con respaldos y acceso</text>
    <text x="492" y="590" fill="#3d2020" font-size="10.5">remoto.</text>

    <!-- Paso 4 -->
    <rect x="700" y="500" width="200" height="96" rx="8" fill="#fff" stroke="#7c2155" stroke-width="1.5"/>
    <circle cx="722" cy="522" r="12" fill="#7c2155"/><text x="722" y="526" text-anchor="middle" font-size="12" font-weight="bold" fill="#fff">4</text>
    <text x="742" y="526" font-size="11.5" font-weight="bold" fill="#7c2155">Repetir sin pisarse</text>
    <text x="712" y="548" fill="#3d2020" font-size="10.5">→ Transacciones y bloqueo</text>
    <text x="712" y="562" fill="#3d2020" font-size="10.5">de filas en el backend, para</text>
    <text x="712" y="576" fill="#3d2020" font-size="10.5">operaciones críticas seguras</text>
    <text x="712" y="590" fill="#3d2020" font-size="10.5">y consistentes.</text>

    <!-- Paso 5 -->
    <rect x="920" y="500" width="200" height="96" rx="8" fill="#fff" stroke="#7c2155" stroke-width="1.5"/>
    <circle cx="942" cy="522" r="12" fill="#7c2155"/><text x="942" y="526" text-anchor="middle" font-size="12" font-weight="bold" fill="#fff">5</text>
    <text x="962" y="526" font-size="11.5" font-weight="bold" fill="#7c2155">Conectar el telar</text>
    <text x="932" y="548" fill="#3d2020" font-size="10.5">→ ESP32 gateway: consulta</text>
    <text x="932" y="562" fill="#3d2020" font-size="10.5">al backend y acciona los</text>
    <text x="932" y="576" fill="#3d2020" font-size="10.5">relés Marcha/Pausa, con</text>
    <text x="932" y="590" fill="#3d2020" font-size="10.5">fail-safe ante fallas.</text>

    <!-- Paso 6 -->
    <rect x="1140" y="500" width="220" height="96" rx="8" fill="#fff" stroke="#7c2155" stroke-width="1.5"/>
    <circle cx="1162" cy="522" r="12" fill="#7c2155"/><text x="1162" y="526" text-anchor="middle" font-size="12" font-weight="bold" fill="#fff">6</text>
    <text x="1182" y="526" font-size="11.5" font-weight="bold" fill="#7c2155">Usarlo en planta</text>
    <text x="1152" y="548" fill="#3d2020" font-size="10.5">→ Página web pensada para</text>
    <text x="1152" y="562" fill="#3d2020" font-size="10.5">el celular (mobile-first), con</text>
    <text x="1152" y="576" fill="#3d2020" font-size="10.5">modo claro/oscuro, sin</text>
    <text x="1152" y="590" fill="#3d2020" font-size="10.5">depender de una PC.</text>
  </g>

  <!-- flechas entre pasos -->
  <g font-size="16" fill="#7c2155" font-weight="bold">
    <text x="248" y="553">→</text><text x="468" y="553">→</text><text x="688" y="553">→</text><text x="908" y="553">→</text><text x="1128" y="553">→</text>
  </g>

  <!-- Resultado final -->
  <rect x="200" y="620" width="1000" height="70" rx="10" fill="#2E6E4A"/>
  <text x="700" y="647" text-anchor="middle" font-size="14" font-weight="bold" fill="#fff">RESULTADO</text>
  <text x="700" y="668" text-anchor="middle" font-size="12" fill="#fff">El problema central quedó resuelto de punta a punta: se diseña en la web, se guarda en la base de datos a través</text>
  <text x="700" y="684" text-anchor="middle" font-size="12" fill="#fff">del backend, y —en la etapa de hardware— se ejecuta en el telar real mediante el ESP32.</text>

  <!-- Leyenda inferior -->
  <text x="700" y="730" text-anchor="middle" font-size="11" fill="#6b5b53">Cada causa (raíz) del árbol de problemas se transformó en un medio (acción) del árbol de soluciones;</text>
  <text x="700" y="746" text-anchor="middle" font-size="11" fill="#6b5b53">cada efecto negativo se transformó en un fin (beneficio) logrado.</text>

  <text x="1370" y="770" text-anchor="end" font-size="10.5" fill="#6b5b53">Control de Inserción de Trama · Árbol de problemas y soluciones</text>
</svg>
