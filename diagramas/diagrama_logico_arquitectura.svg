<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1150 760" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="flechaAzul" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#1d4ed8"/>
    </marker>
    <marker id="flechaVioleta" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#7048a8"/>
    </marker>
    <marker id="flechaAmbar" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#b45309"/>
    </marker>
    <marker id="flechaVerde" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#1f7a3d"/>
    </marker>
    <marker id="flechaGris" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#8a8a8a"/>
    </marker>
  </defs>

  <rect width="1150" height="760" fill="#faf5ec"/>
  <text x="575" y="34" text-anchor="middle" font-size="22" font-weight="bold" fill="#7c2155">Diagrama lógico — Arquitectura del sistema</text>
  <text x="575" y="56" text-anchor="middle" font-size="13" fill="#6b5b53">Cómo se conectan la app, el backend, la base de datos y el telar físico · Control de Inserción de Trama</text>

  <!-- ════════ NIVEL 1: CLIENTES ════════ -->
  <rect x="60" y="86" width="290" height="96" rx="10" fill="#fdeef6" stroke="#7c2155" stroke-width="2"/>
  <text x="205" y="114" text-anchor="middle" font-size="15" font-weight="bold" fill="#7c2155">PÁGINA WEB</text>
  <text x="205" y="134" text-anchor="middle" font-size="11.5">HTML + CSS + JS + jsPDF</text>
  <text x="205" y="151" text-anchor="middle" font-size="11.5">Editor · Biblioteca · Simulación</text>
  <text x="205" y="170" text-anchor="middle" font-size="11" font-weight="bold" fill="#7c2155">Interfaz de uso real (en el celu)</text>

  <rect x="800" y="86" width="290" height="96" rx="10" fill="#f2f2f2" stroke="#8a8a8a" stroke-width="2" stroke-dasharray="7 4"/>
  <text x="945" y="114" text-anchor="middle" font-size="15" font-weight="bold" fill="#5a5a5a">APP ANDROID</text>
  <text x="945" y="134" text-anchor="middle" font-size="11.5">Kotlin + Jetpack Compose</text>
  <text x="945" y="151" text-anchor="middle" font-size="11.5">Base de arquitectura</text>
  <text x="945" y="170" text-anchor="middle" font-size="11" font-weight="bold" fill="#5a5a5a">⚠ Referencia futura, no funcional</text>

  <!-- flechas de clientes hacia backend -->
  <line x1="205" y1="182" x2="205" y2="220" stroke="#1d4ed8" stroke-width="2.5"/>
  <line x1="205" y1="220" x2="545" y2="220" stroke="#1d4ed8" stroke-width="2.5" marker-end="url(#flechaAzul)"/>

  <line x1="945" y1="182" x2="945" y2="220" stroke="#8a8a8a" stroke-width="2" stroke-dasharray="6 3"/>
  <line x1="945" y1="220" x2="605" y2="220" stroke="#8a8a8a" stroke-width="2" stroke-dasharray="6 3" marker-end="url(#flechaGris)"/>

  <rect x="330" y="196" width="270" height="42" rx="6" fill="#eef3fd" stroke="#1d4ed8" stroke-width="1"/>
  <text x="465" y="221" text-anchor="middle" font-size="11.5" fill="#1d4ed8" font-weight="bold">HTTP · API REST (JSON)</text>

  <!-- ════════ NIVEL 2: BACKEND ════════ -->
  <rect x="380" y="252" width="390" height="110" rx="10" fill="#eef3fd" stroke="#1d4ed8" stroke-width="2.5"/>
  <text x="575" y="280" text-anchor="middle" font-size="16" font-weight="bold" fill="#1d4ed8">BACKEND · Node.js + Express</text>
  <text x="575" y="301" text-anchor="middle" font-size="11.5">API REST — /api/patrones · /api/telares · /api/errores</text>
  <text x="575" y="319" text-anchor="middle" font-size="11.5">Transacciones · validaciones · bloqueo de filas</text>
  <text x="575" y="340" text-anchor="middle" font-size="11" font-weight="bold" fill="#1d4ed8">Único punto que habla con la base de datos</text>

  <!-- backend <-> base de datos -->
  <line x1="770" y1="300" x2="845" y2="300" stroke="#7048a8" stroke-width="2.5" marker-end="url(#flechaVioleta)"/>
  <line x1="845" y1="330" x2="770" y2="330" stroke="#7048a8" stroke-width="2.5" marker-end="url(#flechaVioleta)"/>
  <text x="807" y="292" text-anchor="middle" font-size="10" fill="#7048a8">SQL</text>

  <rect x="848" y="252" width="242" height="110" rx="10" fill="#f4eefb" stroke="#7048a8" stroke-width="2.5"/>
  <text x="969" y="282" text-anchor="middle" font-size="15" font-weight="bold" fill="#7048a8">BASE DE DATOS</text>
  <text x="969" y="303" text-anchor="middle" font-size="11.5">PostgreSQL</text>
  <text x="969" y="320" text-anchor="middle" font-size="11.5">alojada en Supabase (nube)</text>
  <text x="969" y="340" text-anchor="middle" font-size="10.5" fill="#7048a8">4 tablas: patrones, telares,</text>
  <text x="969" y="353" text-anchor="middle" font-size="10.5" fill="#7048a8">historial_produccion, errores_log</text>

  <!-- ════════ NIVEL 3: ESP32 ════════ -->
  <line x1="575" y1="362" x2="575" y2="410" stroke="#b45309" stroke-width="2.5" marker-end="url(#flechaAmbar)"/>
  <rect x="600" y="372" width="360" height="34" rx="6" fill="#fff8e6" stroke="#b45309" stroke-width="1"/>
  <text x="780" y="394" text-anchor="middle" font-size="11" fill="#b45309" font-weight="bold">GET /api/telares/:id — sondeo cada ~2,5 s</text>

  <rect x="380" y="416" width="390" height="106" rx="10" fill="#fff8e6" stroke="#b45309" stroke-width="2.5"/>
  <text x="575" y="444" text-anchor="middle" font-size="16" font-weight="bold" fill="#b45309">FIRMWARE ESP32 (Gateway)</text>
  <text x="575" y="465" text-anchor="middle" font-size="11.5">Consulta el estado del telar en el backend</text>
  <text x="575" y="483" text-anchor="middle" font-size="11.5">Arranque seguro · watchdog · fail-safe sin red</text>
  <text x="575" y="504" text-anchor="middle" font-size="11" font-weight="bold" fill="#b45309">No toca la base de datos directo</text>

  <!-- ════════ NIVEL 4: TELAR ════════ -->
  <line x1="575" y1="522" x2="575" y2="562" stroke="#1f7a3d" stroke-width="2.5" marker-end="url(#flechaVerde)"/>
  <rect x="600" y="530" width="330" height="34" rx="6" fill="#edf7ee" stroke="#1f7a3d" stroke-width="1"/>
  <text x="765" y="552" text-anchor="middle" font-size="11" fill="#1f7a3d" font-weight="bold">2 relés · pulso Marcha / Pausa</text>

  <rect x="330" y="568" width="490" height="120" rx="10" fill="#edf7ee" stroke="#1f7a3d" stroke-width="2.5"/>
  <text x="575" y="596" text-anchor="middle" font-size="16" font-weight="bold" fill="#1f7a3d">TELAR FÍSICO INDUSTRIAL</text>
  <text x="575" y="618" text-anchor="middle" font-size="11.5">Botones Marcha / Pausa con relés en paralelo</text>
  <text x="575" y="636" text-anchor="middle" font-size="11.5">La botonera física sigue operable a mano siempre</text>
  <text x="575" y="658" text-anchor="middle" font-size="10.5" fill="#1f7a3d">Diagrama de conexión eléctrica detallado:</text>
  <text x="575" y="674" text-anchor="middle" font-size="10.5" fill="#1f7a3d" font-style="italic">esp32/diagrama_conexion_electrica.svg</text>

  <!-- Leyenda / regla de oro -->
  <rect x="60" y="568" width="240" height="120" rx="10" fill="#fff" stroke="#7c2155" stroke-width="1.5" stroke-dasharray="5 3"/>
  <text x="180" y="592" text-anchor="middle" font-size="12" font-weight="bold" fill="#7c2155">🔑 Regla de oro</text>
  <text x="180" y="614" text-anchor="middle" font-size="10.5">Todos los clientes hablan con</text>
  <text x="180" y="629" text-anchor="middle" font-size="10.5">el MISMO backend por la</text>
  <text x="180" y="644" text-anchor="middle" font-size="10.5">MISMA API. Nadie toca la</text>
  <text x="180" y="659" text-anchor="middle" font-size="10.5">base de datos directo — ni</text>
  <text x="180" y="674" text-anchor="middle" font-size="10.5">siquiera el ESP32.</text>

  <rect x="830" y="568" width="260" height="120" rx="10" fill="#fff" stroke="#5a5a5a" stroke-width="1.5" stroke-dasharray="5 3"/>
  <text x="960" y="592" text-anchor="middle" font-size="12" font-weight="bold" fill="#5a5a5a">ℹ️ Sobre la app Android</text>
  <text x="960" y="614" text-anchor="middle" font-size="10.5">No es parte del producto actual.</text>
  <text x="960" y="629" text-anchor="middle" font-size="10.5">Es una base de arquitectura</text>
  <text x="960" y="644" text-anchor="middle" font-size="10.5">guardada como referencia, por</text>
  <text x="960" y="659" text-anchor="middle" font-size="10.5">si se retoma a futuro. La interfaz</text>
  <text x="960" y="674" text-anchor="middle" font-size="10.5">de uso real es la página web.</text>

  <text x="1090" y="740" text-anchor="end" font-size="10.5" fill="#6b5b53">Control de Inserción de Trama · Diagrama lógico</text>
</svg>
