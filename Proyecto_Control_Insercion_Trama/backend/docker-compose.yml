version: "3.8"

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: control_trama
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PGHOST: db
      PGPORT: 5432
      PGUSER: postgres
      PGPASSWORD: postgres
      PGDATABASE: control_trama
      PORT: 3000
      NODE_ENV: production
      CORS_ORIGIN: "*"
      TRUST_PROXY: "false"
    ports:
      - "3000:3000"
    # Crea/actualiza el esquema, aplica la migración y recién ahí levanta el server
    command: sh -c "node src/db/init.js && node src/db/migrate.js && node src/server.js"

volumes:
  db_data:
