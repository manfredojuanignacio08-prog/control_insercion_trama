<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1150 900" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="flecha" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#3d3d3d"/>
    </marker>
    <marker id="flechaAmbar" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#b45309"/>
    </marker>
  </defs>

  <rect width="1150" height="900" fill="#faf5ec"/>
  <text x="575" y="34" text-anchor="middle" font-size="22" font-weight="bold" fill="#7c2155">Conexión eléctrica Telar – ESP32 (Gateway por relés)</text>
  <text x="575" y="56" text-anchor="middle" font-size="13" fill="#6b5b53">Según la documentación del equipo · Las mejoras recomendadas van en trazo punteado ámbar ⚠</text>

  <!-- ════════ ETAPA 1: POTENCIA ════════ -->
  <rect x="20" y="72" width="1110" height="190" rx="10" fill="#fdeeee" stroke="#c0392b" stroke-width="1.5"/>
  <text x="36" y="96" font-size="15" font-weight="bold" fill="#c0392b">ETAPA 1 · POTENCIA — de los 24V del telar a 5V seguros</text>

  <!-- Cadena principal 24V -->
  <rect x="40" y="115" width="120" height="56" rx="6" fill="#fff" stroke="#c0392b" stroke-width="1.5"/>
  <text x="100" y="138" text-anchor="middle" font-size="13" font-weight="bold">TELAR</text>
  <text x="100" y="156" text-anchor="middle" font-size="12">24V DC (+)</text>

  <line x1="160" y1="143" x2="205" y2="143" stroke="#3d3d3d" stroke-width="2" marker-end="url(#flecha)"/>

  <rect x="208" y="115" width="118" height="56" rx="6" fill="#fff" stroke="#b45309" stroke-width="2" stroke-dasharray="6 3"/>
  <text x="267" y="136" text-anchor="middle" font-size="12.5" font-weight="bold">FUSIBLE</text>
  <text x="267" y="152" text-anchor="middle" font-size="11.5" fill="#b45309">⚠ 0.5 A lento</text>
  <text x="267" y="166" text-anchor="middle" font-size="10.5" fill="#b45309">(valor recomendado)</text>

  <line x1="326" y1="143" x2="371" y2="143" stroke="#3d3d3d" stroke-width="2" marker-end="url(#flecha)"/>

  <rect x="374" y="115" width="128" height="56" rx="6" fill="#fff" stroke="#c0392b" stroke-width="1.5"/>
  <text x="438" y="136" text-anchor="middle" font-size="12.5" font-weight="bold">DIODO SCHOTTKY</text>
  <text x="438" y="152" text-anchor="middle" font-size="11">antipolaridad</text>
  <text x="438" y="166" text-anchor="middle" font-size="10.5" fill="#b45309">⚠ usar ≥2 A (SS34)</text>

  <line x1="502" y1="143" x2="560" y2="143" stroke="#3d3d3d" stroke-width="2"/>
  <!-- nodo -->
  <circle cx="560" cy="143" r="4" fill="#3d3d3d"/>
  <line x1="560" y1="143" x2="880" y2="143" stroke="#3d3d3d" stroke-width="2" marker-end="url(#flecha)"/>

  <!-- riel GND -->
  <line x1="100" y1="171" x2="100" y2="232" stroke="#3d3d3d" stroke-width="2"/>
  <line x1="100" y1="232" x2="880" y2="232" stroke="#3d3d3d" stroke-width="2" marker-end="url(#flecha)"/>
  <text x="118" y="247" font-size="11.5" fill="#3d3d3d">GND (–) del telar</text>

  <!-- componentes en paralelo entre 24V y GND -->
  <line x1="600" y1="143" x2="600" y2="165" stroke="#3d3d3d" stroke-width="1.5"/>
  <rect x="575" y="165" width="50" height="44" rx="4" fill="#fff" stroke="#c0392b" stroke-width="1.2"/>
  <text x="600" y="183" text-anchor="middle" font-size="10" font-weight="bold">TVS</text>
  <text x="600" y="196" text-anchor="middle" font-size="9">P6KE33CA</text>
  <line x1="600" y1="209" x2="600" y2="232" stroke="#3d3d3d" stroke-width="1.5"/>

  <line x1="672" y1="143" x2="672" y2="165" stroke="#3d3d3d" stroke-width="1.5"/>
  <rect x="647" y="165" width="50" height="44" rx="4" fill="#fff" stroke="#c0392b" stroke-width="1.2"/>
  <text x="672" y="183" text-anchor="middle" font-size="10" font-weight="bold">470 µF</text>
  <text x="672" y="196" text-anchor="middle" font-size="9">50V (+arriba)</text>
  <line x1="672" y1="209" x2="672" y2="232" stroke="#3d3d3d" stroke-width="1.5"/>

  <line x1="744" y1="143" x2="744" y2="165" stroke="#3d3d3d" stroke-width="1.5"/>
  <rect x="719" y="165" width="50" height="44" rx="4" fill="#fff" stroke="#c0392b" stroke-width="1.2"/>
  <text x="744" y="183" text-anchor="middle" font-size="10" font-weight="bold">100 nF</text>
  <text x="744" y="196" text-anchor="middle" font-size="9">cerámico</text>
  <line x1="744" y1="209" x2="744" y2="232" stroke="#3d3d3d" stroke-width="1.5"/>

  <!-- LM2596 -->
  <rect x="884" y="120" width="226" height="118" rx="8" fill="#fff" stroke="#c0392b" stroke-width="2"/>
  <text x="997" y="146" text-anchor="middle" font-size="14" font-weight="bold">LM2596 (Step-Down)</text>
  <text x="900" y="168" font-size="11.5">IN+  ← 24V filtrados</text>
  <text x="900" y="185" font-size="11.5">IN–  ← GND</text>
  <text x="900" y="207" font-size="11.5" font-weight="bold" fill="#1d4ed8">OUT+ → 5V regulados</text>
  <text x="900" y="224" font-size="11.5" font-weight="bold" fill="#1d4ed8">OUT– → GND</text>
  <text x="997" y="255" text-anchor="middle" font-size="10.5" fill="#b45309">⚠ ajustar a 5.0V en vacío ANTES de conectar nada</text>

  <!-- ════════ ETAPA 2: CONTROL 5V ════════ -->
  <rect x="20" y="282" width="1110" height="168" rx="10" fill="#eef3fd" stroke="#1d4ed8" stroke-width="1.5"/>
  <text x="36" y="306" font-size="15" font-weight="bold" fill="#1d4ed8">ETAPA 2 · CONTROL — alimentar el ESP32 y las bobinas del relé con 5V</text>

  <rect x="40" y="330" width="150" height="86" rx="8" fill="#fff" stroke="#1d4ed8" stroke-width="1.5"/>
  <text x="115" y="356" text-anchor="middle" font-size="13" font-weight="bold">LM2596</text>
  <text x="115" y="374" text-anchor="middle" font-size="12">OUT+ (5V)</text>
  <text x="115" y="392" text-anchor="middle" font-size="12">OUT– (GND)</text>

  <!-- 47uF a la salida -->
  <rect x="212" y="345" width="58" height="52" rx="4" fill="#fff" stroke="#1d4ed8" stroke-width="1.2"/>
  <text x="241" y="366" text-anchor="middle" font-size="10.5" font-weight="bold">47 µF</text>
  <text x="241" y="381" text-anchor="middle" font-size="9">en paralelo</text>
  <text x="241" y="392" text-anchor="middle" font-size="9">OUT+ / OUT–</text>
  <line x1="190" y1="360" x2="212" y2="360" stroke="#1d4ed8" stroke-width="1.5"/>
  <line x1="190" y1="386" x2="212" y2="386" stroke="#1d4ed8" stroke-width="1.5"/>

  <!-- 5V a ESP32 y relé -->
  <line x1="270" y1="360" x2="420" y2="360" stroke="#1d4ed8" stroke-width="2" marker-end="url(#flecha)"/>
  <line x1="330" y1="360" x2="330" y2="405" stroke="#1d4ed8" stroke-width="2"/>
  <line x1="330" y1="405" x2="700" y2="405" stroke="#1d4ed8" stroke-width="2" marker-end="url(#flecha)"/>

  <rect x="424" y="333" width="180" height="54" rx="8" fill="#fff" stroke="#1d4ed8" stroke-width="1.5"/>
  <text x="514" y="356" text-anchor="middle" font-size="13" font-weight="bold">ESP32 · pin VIN</text>
  <text x="514" y="374" text-anchor="middle" font-size="11">(+ GND al OUT–)</text>

  <rect x="704" y="380" width="220" height="54" rx="8" fill="#fff" stroke="#1d4ed8" stroke-width="1.5"/>
  <text x="814" y="401" text-anchor="middle" font-size="13" font-weight="bold">RELÉ · JD-VCC + GND</text>
  <text x="814" y="419" text-anchor="middle" font-size="11" fill="#c0392b" font-weight="bold">¡Quitar el jumper JD-VCC!</text>

  <rect x="940" y="330" width="180" height="104" rx="8" fill="#fff8e6" stroke="#b45309" stroke-width="1.8" stroke-dasharray="6 3"/>
  <text x="1030" y="352" text-anchor="middle" font-size="12" font-weight="bold" fill="#b45309">⚠ REGLA DE ORO</text>
  <text x="1030" y="371" text-anchor="middle" font-size="10.5">Nunca conectar el USB</text>
  <text x="1030" y="386" text-anchor="middle" font-size="10.5">con los 24V puestos.</text>
  <text x="1030" y="404" text-anchor="middle" font-size="10.5">Para programar: cortar</text>
  <text x="1030" y="419" text-anchor="middle" font-size="10.5">los 24V primero.</text>

  <!-- ════════ ETAPA 3: LÓGICA ════════ -->
  <rect x="20" y="470" width="1110" height="200" rx="10" fill="#f4eefb" stroke="#7048a8" stroke-width="1.5"/>
  <text x="36" y="494" font-size="15" font-weight="bold" fill="#7048a8">ETAPA 3 · LÓGICA — las órdenes del ESP32 hacia el módulo de relés (3.3V)</text>

  <rect x="60" y="516" width="220" height="132" rx="8" fill="#fff" stroke="#7048a8" stroke-width="2"/>
  <text x="170" y="540" text-anchor="middle" font-size="14" font-weight="bold">ESP32</text>
  <text x="80" y="566" font-size="12.5" font-weight="bold">3.3V</text>
  <text x="80" y="596" font-size="12.5" font-weight="bold">GPIO 25</text>
  <text x="80" y="626" font-size="12.5" font-weight="bold">GPIO 26</text>
  <text x="170" y="644" text-anchor="middle" font-size="9.5" fill="#6b5b53">(25/26 = pines seguros, no de arranque)</text>

  <rect x="770" y="516" width="250" height="132" rx="8" fill="#fff" stroke="#7048a8" stroke-width="2"/>
  <text x="895" y="540" text-anchor="middle" font-size="14" font-weight="bold">MÓDULO RELÉ ×2</text>
  <text x="790" y="566" font-size="12.5" font-weight="bold">VCC (lógica)</text>
  <text x="790" y="596" font-size="12.5" font-weight="bold">IN1 → Marcha</text>
  <text x="790" y="626" font-size="12.5" font-weight="bold">IN2 → Pausa</text>
  <text x="895" y="644" text-anchor="middle" font-size="9.5" fill="#6b5b53">optoacoplado · activo-bajo (config.)</text>

  <line x1="280" y1="561" x2="765" y2="561" stroke="#7048a8" stroke-width="2" marker-end="url(#flecha)"/>
  <line x1="280" y1="591" x2="765" y2="591" stroke="#7048a8" stroke-width="2" marker-end="url(#flecha)"/>
  <line x1="280" y1="621" x2="765" y2="621" stroke="#7048a8" stroke-width="2" marker-end="url(#flecha)"/>
  <text x="522" y="554" text-anchor="middle" font-size="11">3.3V → VCC lógico</text>

  <!-- pull-ups recomendados -->
  <line x1="480" y1="561" x2="480" y2="591" stroke="#b45309" stroke-width="2" stroke-dasharray="5 3"/>
  <rect x="462" y="568" width="36" height="16" rx="3" fill="#fff8e6" stroke="#b45309" stroke-width="1.3" stroke-dasharray="4 2"/>
  <text x="480" y="580" text-anchor="middle" font-size="9.5" fill="#b45309" font-weight="bold">10 kΩ</text>

  <line x1="620" y1="561" x2="620" y2="621" stroke="#b45309" stroke-width="2" stroke-dasharray="5 3"/>
  <rect x="602" y="583" width="36" height="16" rx="3" fill="#fff8e6" stroke="#b45309" stroke-width="1.3" stroke-dasharray="4 2"/>
  <text x="620" y="595" text-anchor="middle" font-size="9.5" fill="#b45309" font-weight="bold">10 kΩ</text>

  <text x="522" y="663" text-anchor="middle" font-size="11" fill="#b45309" font-weight="bold">⚠ Pull-ups de 10 kΩ (IN1 e IN2 a 3.3V): evitan el pulso fantasma de los relés al encender/reiniciar</text>

  <!-- ════════ ETAPA 4: ACTUACIÓN ════════ -->
  <rect x="20" y="690" width="1110" height="150" rx="10" fill="#edf7ee" stroke="#1f7a3d" stroke-width="1.5"/>
  <text x="36" y="714" font-size="15" font-weight="bold" fill="#1f7a3d">ETAPA 4 · ACTUACIÓN — los relés "aprietan" la botonera del telar (en paralelo)</text>

  <rect x="60" y="736" width="230" height="84" rx="8" fill="#fff" stroke="#1f7a3d" stroke-width="1.5"/>
  <text x="175" y="760" text-anchor="middle" font-size="13" font-weight="bold">RELÉ · salidas</text>
  <text x="80" y="784" font-size="12">NO1 + COM1</text>
  <text x="80" y="806" font-size="12">NO2 + COM2</text>

  <line x1="290" y1="780" x2="560" y2="780" stroke="#1f7a3d" stroke-width="2" marker-end="url(#flecha)"/>
  <line x1="290" y1="802" x2="560" y2="802" stroke="#1f7a3d" stroke-width="2" marker-end="url(#flecha)"/>
  <text x="425" y="772" text-anchor="middle" font-size="10.5" fill="#b45309">⚠ par trenzado, lejos de los cables de motor</text>

  <rect x="564" y="736" width="250" height="38" rx="8" fill="#fff" stroke="#1f7a3d" stroke-width="1.5"/>
  <text x="689" y="760" text-anchor="middle" font-size="12.5" font-weight="bold">Botón MARCHA del telar (paralelo)</text>
  <rect x="564" y="782" width="250" height="38" rx="8" fill="#fff" stroke="#1f7a3d" stroke-width="1.5"/>
  <text x="689" y="806" text-anchor="middle" font-size="12.5" font-weight="bold">Botón PAUSA del telar (paralelo)</text>

  <rect x="840" y="736" width="280" height="84" rx="8" fill="#fff" stroke="#1f7a3d" stroke-width="1.2"/>
  <text x="980" y="758" text-anchor="middle" font-size="11.5" font-weight="bold" fill="#1f7a3d">La botonera física sigue funcionando</text>
  <text x="980" y="776" text-anchor="middle" font-size="10.5">La conexión en paralelo no invade la</text>
  <text x="980" y="791" text-anchor="middle" font-size="10.5">lógica nativa de la máquina: sin red,</text>
  <text x="980" y="806" text-anchor="middle" font-size="10.5">el telar se opera a mano como siempre.</text>

  <!-- Leyenda -->
  <line x1="40" y1="868" x2="90" y2="868" stroke="#3d3d3d" stroke-width="2"/>
  <text x="98" y="872" font-size="11.5">Documentado por el equipo</text>
  <line x1="300" y1="868" x2="350" y2="868" stroke="#b45309" stroke-width="2" stroke-dasharray="6 3"/>
  <text x="358" y="872" font-size="11.5" fill="#b45309">⚠ Mejora recomendada (ver RECOMENDACIONES_ELECTRICAS.md)</text>
  <text x="1110" y="872" text-anchor="end" font-size="10.5" fill="#6b5b53">Control de Inserción de Trama · Gateway ESP32</text>
</svg>
